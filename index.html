<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FUSTA - FIFA Statistik-Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F3F6F4">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A1119">
    <meta name="theme-color" content="#00A862">
    <meta name="description" content="FUSTA - Verfolge FIFA-Spiele, Spieler, Sperren und Finanzen mit modernem Design">

    <!-- iOS PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FUSTA">
    <meta name="format-detection" content="telephone=no">

    <!-- iOS App Icon (iOS scales 180px for all devices) -->
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/icon-180.png">

    <!-- iOS Splash Screen -->
    <link rel="apple-touch-startup-image" href="./assets/logo-fusta.png">

    <!-- Windows PWA Meta Tags -->
    <meta name="msapplication-TileColor" content="#00A862">
    <meta name="msapplication-TileImage" content="./assets/logo-fusta.png">

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" href="./assets/icon-180.png">

    <!-- Inter Google Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Icons are provided by the in-app SVG icon set (src/components/icons); no Font Awesome. -->
    <!-- Supabase is bundled via the npm import in src/utils/supabase.js;
         no separate CDN <script> needed (removed to avoid a redundant load). -->
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
